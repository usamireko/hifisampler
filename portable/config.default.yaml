version: 0.0.6
portable:
  active_model_profile: "pc_nsf"
env:
  conda_base_path: ""
  conda_env_name: "hifisampler"
  python_script_path: "./hifiserver.py"
model:
  # Place release model files under portable/models.
  vocoder_path: "./models/pc_nsf_hifigan_44.1k_hop512_128bin_2025.02/model.onnx"
  model_type: "onnx"
  hnsep_model_path: "./models/hnsep/vr/model_fp16.onnx"
audio:
  sample_rate: 44100
  win_size: 2048
  hop_size: 512
  origin_hop_size: 128
  n_fft: 2048
  n_mels: 128
  mel_fmin: 40
  mel_fmax: 16000
processing:
  wave_norm: true
  trim_silence: true
  silence_threshold: -52.0
  loop_mode: true
  peak_limit: 1.0
  fill: 6
performance:
  max_workers: 2
