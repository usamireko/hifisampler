name: Build multiplatform release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the generated package."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
          - os: linux
            runner: ubuntu-latest
          - os: macos
            runner: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build release
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
          fi
          python3 scripts/build_release.py \
            --version "$version" \
            --os "${{ matrix.os }}" \
            --output-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hifisampler-portable-${{ matrix.os }}
          path: dist/hifisampler-portable-${{ matrix.os }}-*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hifisampler-portable-*
          merge-multiple: true
          path: dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
