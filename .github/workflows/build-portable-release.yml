name: Build portable Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the generated zip. Defaults to the branch/tag name."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-portable:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build portable package
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}"
          }
          .\scripts\build_portable_release.ps1 -Version $version

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hifisampler-portable-windows
          path: dist/hifisampler-portable-windows-*.zip

      - name: Upload zip to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hifisampler-portable-windows-*.zip
